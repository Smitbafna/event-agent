# Development/Testing docker-compose
# For local development only - uses volume mounts and host networking

services:
  nats:
    image: nats:latest
    container_name: eventagent-nats
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats-data:/data
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 1s
      timeout: 1s
      retries: 30

  eventagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventagent-agent
    command: ["run", "--servers", "nats:4222"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - eventagent-data:/data/.eventagent
    ports:
      - "4222:4222"

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventagent-payment-service
    command: ["payment-service", "--servers", "nats:4222"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PAYMENT_RESULT=success
      - NATS_SERVERS=nats:4222

volumes:
  nats-data:
  eventagent-data: